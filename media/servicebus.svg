<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Top tray -->
  <rect x="3.5" y="0.5" width="15" height="1.2" fill="currentColor"/>
  <rect x="3.5" y="1.7" width="2.5" height="1.8" fill="currentColor"/>
  <rect x="16" y="1.7" width="2.5" height="1.8" fill="currentColor"/>

  <!-- Left envelope -->
  <rect x="1.5" y="5.5" width="5.5" height="3.5" rx="0.3" fill="currentColor"/>
  <path d="M1.5 5.5 L4.25 8 L7 5.5" fill="none" stroke="currentColor" stroke-width="0.4" stroke-linejoin="round"/>

  <!-- Center envelope -->
  <rect x="8.5" y="5.5" width="5.5" height="3.5" rx="0.3" fill="currentColor"/>
  <path d="M8.5 5.5 L11.25 8 L14 5.5" fill="none" stroke="currentColor" stroke-width="0.4" stroke-linejoin="round"/>

  <!-- Right envelope -->
  <rect x="15.5" y="5.5" width="5.5" height="3.5" rx="0.3" fill="currentColor"/>
  <path d="M15.5 5.5 L18.25 8 L21 5.5" fill="none" stroke="currentColor" stroke-width="0.4" stroke-linejoin="round"/>

  <!-- Bottom tray (inverted) -->
  <rect x="3.5" y="11" width="2.5" height="1.8" fill="currentColor"/>
  <rect x="16" y="11" width="2.5" height="1.8" fill="currentColor"/>
  <rect x="3.5" y="12.8" width="15" height="1.2" fill="currentColor"/>

  <!-- Magnifying glass -->
  <circle cx="18" cy="13" r="3.2" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <line x1="20.3" y1="15.3" x2="23" y2="18" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
</svg>